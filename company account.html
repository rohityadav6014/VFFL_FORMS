<script>
// Inject brand logos into header (defensive; must not block button handlers if logos.js failed to load)
try {
  if (typeof LOGO_WORDMARK !== 'undefined' && typeof LOGO_SEAL !== 'undefined') {
    const wm = document.createElement('img');
    wm.className = 'wordmark'; wm.src = LOGO_WORDMARK; wm.alt = 'Vivek Financial';
    const sl = document.createElement('img');
    sl.className = 'seal'; sl.src = LOGO_SEAL; sl.alt = 'Serving Investors Since 1995';
    document.getElementById('brandBlock').append(wm, sl);
  } else {
    console.warn('logos.js did not load; header logos and PDF logos will be omitted.');
  }
} catch (e) { console.error('Logo injection failed:', e); }

// Use the shield logo extracted from the source DOCX (falls back to a drawn shield if missing)
const LOGO_SHIELD = (typeof LOGO_SHIELD_SRC !== 'undefined') ? LOGO_SHIELD_SRC : (function() {
  const c = document.createElement('canvas');
  c.width = 120; c.height = 132;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a1f2e';
  ctx.beginPath();
  ctx.moveTo(15, 5); ctx.lineTo(105, 5);
  ctx.quadraticCurveTo(115, 5, 115, 18);
  ctx.lineTo(115, 70);
  ctx.quadraticCurveTo(115, 105, 60, 128);
  ctx.quadraticCurveTo(5, 105, 5, 70);
  ctx.lineTo(5, 18);
  ctx.quadraticCurveTo(5, 5, 15, 5);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(28, 50); ctx.lineTo(28, 70);
  ctx.lineTo(58, 70); ctx.lineTo(58, 80);
  ctx.lineTo(92, 60); ctx.lineTo(58, 40);
  ctx.lineTo(58, 50); ctx.closePath(); ctx.fill();
  return c.toDataURL('image/png');
})();

      Array.from(el).forEach(e => {
        if (e.type === 'checkbox') e.checked = !!v; else e.value = v;

}

function fmtDDMMYYYY(s) {
  if (!s) return '';
  const parts = String(s).split(/[\/\-.]/);
  if (parts.length === 3) {
    if (parts[0].length === 4) { 
      return parts[2].padStart(2,'0') + parts[1].padStart(2,'0') + parts[0];
    } else { 
      let y = parts[2];
      if (y.length === 2) y = '20' + y;
      return parts[0].padStart(2,'0') + parts[1].padStart(2,'0') + y;
    }
  }
  const d = new Date(s);
  if (!isNaN(d)) {
    return String(d.getDate()).padStart(2,'0') +
           String(d.getMonth()+1).padStart(2,'0') +
           d.getFullYear();
  }
  return String(s).replace(/\D/g, '').substring(0, 8);
}

  function setText(c) { doc.setTextColor(c[0], c[1], c[2]); }
  function drawCells(x, yy, value, count, cellW, cellH) {
    cellW = cellW || 10; cellH = cellH || CELL_H;
    setBorder([60,60,60], 0.4);
    for (let i = 0; i < count; i++) doc.rect(x + i * cellW, yy, cellW, cellH);

  function setBorder(c, lw) {
    c = c || COL_BORDER;

  }
  function setText(c) { c = c || COL_TEXT; doc.setTextColor(c[0], c[1], c[2]); }

  function drawCells(x, yy, value, count, cellW, cellH) {
    cellW = cellW || 10; cellH = cellH || CELL_H;
    setBorder(COL_BORDER, 0.4);
    for (let i = 0; i < count; i++) doc.rect(x + i * cellW, yy, cellW, cellH);
    if (value) {
      setText(COL_TEXT);
      const fs = Math.max(7, cellH * 0.62);
      doc.setFont('helvetica', 'bold').setFontSize(fs);
      const v = String(value).toUpperCase();
      for (let i = 0; i < Math.min(v.length, count); i++) {
        doc.text(v[i], x + i * cellW + cellW / 2, yy + cellH * 0.74, { align: 'center' });
      }
    }
    return x + count * cellW;
  }

    cellW = cellW || 9;

      ['0 to 50 lots', 'Rs. 100/lot'],

      ['301 to 600 lots', 'Rs. 80/lot'],
      ['601 to 1200 lots', 'Rs. 70/lot'],
      ['1201 to 2400 lots', 'Rs. 60/lot'],
      ['2401 to 4800 lots', 'Rs. 50/lot'],
      ['Above 4801 lots', 'Rs. 40/lot']
  ];
  
  for(let i=0; i<7; i++) {

      doc.text(rightBrokerage[i][0], rX + 25, y + (i*15));

  }
  
  y += 7 * 15 + 20;
  
  doc.text('5. Annual Maintenance Chages:', M, y);
  doc.text('Rs. 500/-', M + 170, y, { align: 'center' });

  let note1 = "These charges are subject to minimum either of Rs. 50/- or brokerage at maximum rate permitted by the\nExchange/s for a contact note.";
  let note2 = "Courier and other of pocket charges as applicable shall be levied separately.";

  // ============================================================
  // TEXT RENDERER FOR PAGES 15-24
  // ============================================================
  const annexureText = [
    // Page 15-18 - Annexure 4
    { type: 'title', text: 'Annexure-4' },
    { type: 'subtitle', text: 'RIGHTS AND OBLIGATIONS OF STOCK BROKERS, SUB-BROKERS AND CLIENTS as\nprescribed by SEBI and Stock Exchanges' },
    { type: 'num', num: '1.', text: 'The client shall invest/trade in those securities/contracts/other instruments admitted to dealings on the Exchanges as defined in the Rules, Byelaws and Regulations of Exchanges/ Securities and Exchange Board of India (SEBI) and circulars/notices issued there under from time to time.' },
    { type: 'num', num: '2.', text: 'The stock broker, sub-broker and the client shall be bound by all the Rules, Byelaws and Regulations of the Exchange and circulars/notices issued there under and Rules and Regulations of SEBI and relevant notifications of Government authorities as may be in force from time to time.' },
    { type: 'num', num: '3.', text: 'The client shall satisfy itself of the capacity of the stock broker to deal in securities and/or deal in derivatives contracts and wishes to execute its orders through the stock broker and the client shall from time to time continue to satisfy itself of such capability of the stock broker before executing orders through the stock broker.' },
    { type: 'num', num: '4.', text: 'The stock broker shall continuously satisfy itself about the genuineness and financial soundness of the client and investment objectives relevant to the services to be provided.' },
    { type: 'num', num: '5.', text: 'The stock broker shall take steps to make the client aware of the precise nature of the Stock broker\'s liability for business to be conducted, including any limitations, the liability and the capacity in which the stock broker acts.' },
    { type: 'num', num: '6.', text: 'The sub-broker shall provide necessary assistance and co-operate with the stock broker in all its dealings with the client(s).' },
    { type: 'section', text: 'CLIENT INFORMATION' },
    { type: 'num', num: '7.', text: 'The client shall furnish all such details in full as are required by the stock broker in "Account Opening Form" with supporting details, made mandatory by stock exchanges/SEBI from time to time.' },
    { type: 'num', num: '8.', text: 'The client shall familiarize himself with all the mandatory provisions in the Account Opening documents. Any additional clauses or documents specified by the stock broker shall be non-mandatory, as per terms & conditions accepted by the client.' },
    { type: 'num', num: '9.', text: 'The client shall immediately notify the stock broker in writing if there is any change in the information in the \'account opening form\' as provided at the time of account opening and thereafter; including the information on winding up petition/insolvency petition or any litigation which may have material bearing on his capacity. The client shall provide/update the financial information to the stock broker on a periodic basis.' },
    { type: 'num', num: '10.', text: 'The stock broker and sub-broker shall maintain all the details of the client as mentioned in the account opening form or any other information pertaining to the client, confidentially and that they shall not disclose the same to any person/authority except as required under any law/regulatory requirements. Provided however that the stock broker may so disclose information about his client to any person or authority with the express permission of the client.' },
    { type: 'section', text: 'MARGINS' },
    { type: 'num', num: '11.', text: 'The client shall pay applicable initial margins, withholding margins, special margins or such other margins as are considered necessary by the stock broker or the Exchange or as may be directed by SEBI from time to time as applicable to the segment(s) in which the client trades. The stock broker is permitted in its sole and absolute discretion to collect additional margins (even though not required by the Exchange, Clearing House/Clearing Corporation or SEBI) and the client shall be obliged to pay such margins within the stipulated time.' },
    { type: 'num', num: '12.', text: 'The client understands that payment of margins by the client does not necessarily imply complete satisfaction of all dues. In spite of consistently having paid margins, the client may, on the settlement of its trade, be obliged to pay (or entitled to receive) such further sums as the contract may dictate/require.' },
    { type: 'section', text: 'TRANSACTIONS AND SETTLEMENTS' },
    { type: 'num', num: '13.', text: 'The client shall give any order for buy or sell of a security/derivatives contract in writing or in such form or manner, as may be mutually agreed between the client and the stock broker. The stock broker shall ensure to place orders and execute the trades of the client, only in the Unique Client Code assigned to that client.' },
    { type: 'num', num: '14.', text: 'The stock broker shall inform the client and keep him apprised about trading/settlement cycles, delivery/payment schedules, any changes therein from time to time, and it shall be the responsibility in turn of the client to comply with such schedules/procedures of the relevant stock exchange where the trade is executed.' },
    { type: 'num', num: '15.', text: 'The stock broker shall ensure that the money/securities deposited by the client shall be kept in a separate account, distinct from his/its own account or account of any other client and shall not be used by the stock broker for himself/itself or for any other client or for any purpose other than the purposes mentioned in Rules, Regulations, circulars, notices, guidelines of SEBI and/or Rules, Regulations, Bye-laws, circulars and notices of Exchange.' },
    { type: 'num', num: '16.', text: 'Where the Exchange(s) cancels trade(s) suo moto all such trades including the trade/s done on behalf of the client shall ipso facto stand cancelled, stock broker shall be entitled to cancel the respective contract(s) with client(s).' },
    { type: 'num', num: '17.', text: 'The transactions executed on the Exchange are subject to Rules, Byelaws and Regulations and circulars/notices issued thereunder of the Exchanges where the trade is executed and all parties to such trade shall have submitted to the jurisdiction of such court as may be specified by the Byelaws and Regulations of the Exchanges where the trade is executed for the purpose of giving effect to the provisions of the Rules, Byelaws and Regulations of the Exchanges and the circulars/notices issued thereunder.' },
    { type: 'section', text: 'BROKERAGE' },
    { type: 'num', num: '18.', text: 'The Client shall pay to the stock broker brokerage and statutory levies as are prevailing from time to time and as they apply to the Client\'s account, transactions and to the services that stock broker renders to the Client. The stock broker shall not charge brokerage more than the maximum brokerage permissible as per the rules, regulations and bye-laws of the relevant stock exchanges and/or rules and regulations of SEBI.' },
    { type: 'section', text: 'LIQUIDATION AND CLOSE OUT OF POSITION' },
    { type: 'num', num: '19.', text: 'Without prejudice to the stock broker\'s other rights (including the right to refer a matter to arbitration), the client understands that the stock broker shall be entitled to liquidate/close out all or any of the client\'s positions for non payment of margins or other amounts, outstanding debts, etc. and adjust the proceeds of such liquidation/close out, if any, against the client\'s liabilities/obligations. Any and all losses and financial charges on account of such liquidation/closing-out shall be charged to and borne by the client.' },
    { type: 'num', num: '20.', text: 'In the event of death or insolvency of the client or his/its otherwise becoming incapable of receiving and paying for or delivering or transferring securities which the client has ordered to be bought or sold, stock broker may close out the transaction of the client and claim losses, if any, against the estate of the client. The client or his nominees, successors, heirs and assignee shall be entitled to any surplus which may result there from. The client shall note that transfer of funds/securities in favor of a Nominee shall be valid discharge by the stock broker against the legal heir.' },
    { type: 'num', num: '21.', text: 'The stock broker shall bring to the notice of the relevant Exchange the information about default in payment/delivery and related aspects by a client. In case where defaulting client is a corporate entity/partnership/proprietary firm or any other artificial legal entity, then the name(s) of Director(s)/Promoter(s)/Partner(s)/Proprietor as the case may be, shall also be communicated by the stock broker to the relevant Exchange(s).' },
    { type: 'section', text: 'DISPUTE RESOLUTION' },
    { type: 'num', num: '22.', text: 'The stock broker shall provide the client with the relevant contact details of the concerned Exchanges and SEBI.' },
    { type: 'num', num: '23.', text: 'The stock broker shall co-operate in redressing grievances of the client in respect of all transactions routed through it and in removing objections for bad delivery of shares, rectification of bad delivery, etc.' },
    { type: 'num', num: '24.', text: 'The client and the stock broker shall refer any claims and/or disputes with respect to deposits, margin money, etc., to arbitration as per the Rules, Byelaws and Regulations of the Exchanges where the trade is executed and circulars/notices issued thereunder as may be in force from time to time.' },
    { type: 'num', num: '25.', text: 'The stock broker shall ensure faster settlement of any arbitration proceedings arising out of the transactions entered into between him vis-a-vis the client and he shall be liable to implement the arbitration awards made in such proceedings.' },
    { type: 'num', num: '26.', text: 'The client/stock-broker understands that the instructions issued by an authorized representative for dispute resolution, if any, of the client/stock-broker shall be binding on the client/stock-broker in accordance with the letter authorizing the said representative to deal on behalf of the said client/stock-broker.' },
    { type: 'section', text: 'TERMINATION OF RELATIONSHIP' },
    { type: 'num', num: '27.', text: 'This relationship between the stock broker and the client shall be terminated; if the stock broker for any reason ceases to be a member of the stock exchange including cessation of membership by reason of the stock broker\'s default, death, resignation or expulsion or if the certificate is cancelled by the Board.' },
    { type: 'num', num: '28.', text: 'The stock broker, sub-broker and the client shall be entitled to terminate the relationship between them without giving any reasons to the other party, after giving notice in writing of not less than one month to the other parties. Notwithstanding any such termination, all rights, liabilities and obligations of the parties arising out of or in respect of transactions entered into prior to the termination of this relationship shall continue to subsist and vest in/be binding on the respective parties or his/its respective heirs, executors, administrators, legal representatives or successors, as the case may be.' },
    { type: 'num', num: '29.', text: 'In the event of demise/insolvency of the sub-broker or the cancellation of his/its registration with the Board or/withdrawal of recognition of the sub-broker by the stock exchange and/or termination of the agreement with the sub broker by the stock broker, for any reason whatsoever, the client shall be informed of such termination and the client shall be deemed to be the direct client of the stock broker and all clauses in the \'Rights and Obligations\' document(s) governing the stock broker, sub-broker and client shall continue to be in force as it is, unless the client intimates to the stock broker his/its intention to terminate their relationship by giving a notice in writing of not less than one month.' },
    { type: 'section', text: 'ADDITIONAL RIGHTS AND OBLIGATIONS' },
    { type: 'num', num: '30.', text: 'The stock broker shall ensure due protection to the client regarding client\'s rights to dividends, rights or bonus shares, etc. in respect of transactions routed through it and it shall not do anything which is likely to harm the interest of the client with whom and for whom they may have had transactions in securities.' },
    { type: 'num', num: '31.', text: 'The stock broker and client shall reconcile and settle their accounts from time to time as per the Rules, Regulations, Bye Laws, Circulars, Notices and Guidelines issued by SEBI and the relevant Exchanges where the trade is executed.' },
    { type: 'num', num: '32.', text: 'The stock broker shall issue a contract note to his constituents for trades executed in such format as may be prescribed by the Exchange from time to time containing records of all transactions including details of order number, trade number, trade time, trade price, trade quantity, details of the derivatives contract, client code, brokerage, all charges levied etc. and with all other relevant details as required therein to be filled in and issued in such manner and within such time as prescribed by the Exchange. The stock broker shall send contract notes to the investors within one working day of the execution of the trades in hard copy and/or in electronic form using digital signature.' },
    { type: 'num', num: '33.', text: 'The stock broker shall make payout of funds or delivery of securities, as the case may be, to the Client within one working day of receipt of the payout from the relevant Exchange where the trade is executed unless otherwise specified by the client and subject to such terms and conditions as may be prescribed by the relevant Exchange from time to time where the trade is executed.' },
    { type: 'num', num: '34.', text: 'The stock broker shall send a complete \'Statement of Accounts\' for both funds and securities in respect of each of its clients in such periodicity and format within such time, as may be prescribed by the relevant Exchange, from time to time, where the trade is executed. The Statement shall also state that the client shall report errors, if any, in the Statement within such time as may be prescribed by the relevant Exchange from time to time where the trade was executed, from the receipt thereof to the Stock broker.' },
    { type: 'num', num: '35.', text: 'The stock broker shall send daily margin statements to the clients. Daily Margin statement should include, inter-alia, details of collateral deposited, collateral utilized and collateral status (available balance/due from client) with break up in terms of cash, Fixed Deposit Receipts (FDRs), Bank Guarantee and securities.' },
    { type: 'num', num: '36.', text: 'The Client shall ensure that it has the required legal capacity to, and is authorized to, enter into the relationship with stock broker and is capable of performing his obligations and undertakings hereunder. All actions required to be taken to ensure compliance of all the transactions, which the Client may enter into shall be completed by the Client prior to such transaction being entered into.' },
    { type: 'section', text: 'ELECTRONIC CONTRACT NOTES (ECN)' },
    { type: 'num', num: '37.', text: 'In case, client opts to receive the contract note in electronic form, he shall provide an appropriate e-mail id to the stock broker. The client shall communicate to the stock broker any change in the email-id through a physical letter. If the client has opted for internet trading, the request for change of email id may be made through the secured access by way of client specific user id and password.' },
    { type: 'num', num: '38.', text: 'The stock broker shall ensure that all ECNs sent through the e-mail shall be digitally signed, encrypted, non-tamper able and in compliance with the provisions of the IT Act, 2000. In case, ECN is sent through e-mail as an attachment, the attached file shall also be secured with the digital signature, encrypted and non-tamperable.' },
    { type: 'num', num: '39.', text: 'The client shall note that non-receipt of bounced mail notification by the stock broker shall amount to delivery of the contract note at the e-mail ID of the client.' },
    { type: 'num', num: '40.', text: 'The stock broker shall retain ECN and acknowledgement of the e-mail in a soft and non-tamperable form in the manner prescribed by the exchange in compliance with the provisions of the IT Act, 2000 and as per the extant rules/regulations/circulars/guidelines issued by SEBI/Stock Exchanges from time to time. The proof of delivery i.e., log report generated by the system at the time of sending the contract notes shall be maintained by the stock broker for the specified period under the extant regulations of SEBI/stock exchanges. The log report shall provide the details of the contract notes that are not delivered to the client/e-mails rejected or bounced back. The stock broker shall take all possible steps to ensure receipt of notification of bounced mails by him at all times within the stipulated time period under the extant regulations of SEBI/stock exchanges.' },
    { type: 'num', num: '41.', text: 'The stock broker shall continue to send contract notes in the physical mode to such clients who do not opt to receive the contract notes in the electronic form. Wherever the ECNs have not been delivered to the client or has been rejected (bouncing of mails) by the e-mail ID of the client, the stock broker shall send a physical contract note to the client within the stipulated time under the extant regulations of SEBI/stock exchanges and maintain the proof of delivery of such physical contract notes.' },
    { type: 'num', num: '42.', text: 'In addition to the e-mail communication of the ECNs to the client, the stock broker shall simultaneously publish the ECN on his designated web-site, if any, in a secured way and enable relevant access to the clients and for this purpose, shall allot a unique user name and password to the client, with an option to the client to save the contract note electronically and/or take a print out of the same.' },
    { type: 'section', text: 'LAW AND JURISDICTION' },
    { type: 'num', num: '43.', text: 'In addition to the specific rights set out in this document, the stock broker, sub-broker and the client shall be entitled to exercise any other rights which the stock broker or the client may have under the Rules, Bye-laws and Regulations of the Exchanges in which the client chooses to trade and circulars/notices issued thereunder and Rules and Regulations of SEBI.' },
    { type: 'num', num: '44.', text: 'The provisions of this document shall always be subject to Government notifications, any rules, regulations, guidelines and circulars/notices issued by SEBI and Rules, Regulations and Bye laws of the relevant stock exchanges, where the trade is executed, that may be in force from time to time.' },
    { type: 'num', num: '45.', text: 'The stock broker and the client shall abide by any award passed by the Arbitrator(s) under the Arbitration and Conciliation Act, 1996. However, there is also a provision of appeal within the stock exchanges, if either party is not satisfied with the arbitration award.' },
    { type: 'num', num: '46.', text: 'Words and expressions which are used in this document but which are not defined herein shall, unless the context otherwise requires, have the same meaning as assigned thereto in the Rules, Byelaws and Regulations and circulars/notices issued thereunder of the Exchanges/SEBI.' },
    { type: 'num', num: '47.', text: 'All additional voluntary clauses/document added by the stock broker should not be in contravention with rules/regulations/notices/circulars of Exchanges/SEBI. Any changes in such voluntary clauses/document(s) need to be preceded by a notice of 15 days. Any changes in the rights and obligations which are specified by Exchanges/SEBI shall also be brought to the notice of the clients.' },
    { type: 'num', num: '48.', text: 'If the rights and obligations of the parties hereto are altered by virtue of change in Rules and regulations of SEBI or Bye-laws, Rules and Regulations of the relevant stock Exchanges where the trade is executed, such changes shall be deemed to have been incorporated herein in modification of the rights and obligations of the parties mentioned in this document.' },

    // Page 19
    { type: 'pageBreak', pageNum: 19 },
    { type: 'subtitle', text: 'INTERNET & WIRELESS TECHNOLOGY BASED TRADING FACILITY PROVIDED BY STOCK BROKERS TO CLIENT (All\nthe clauses mentioned in the \'Rights and Obligations\' document(s) shall be applicable. Additionally, the clauses\nmentioned herein shall also be applicable.' },
    { type: 'num', num: '1.', text: 'Stock broker is eligible for providing Internet based trading (IBT) and securities trading through the use of wireless technology that shall include the use of devices such as mobile phone, laptop with data card, etc. which Internet Protocol (IP). The stock broker shall comply with all requirements applicable to internet based trading/securities trading using wireless technology as may be specified by SEBI & the Exchanges from time to time.' },
    { type: 'num', num: '2.', text: 'The client is desirous of investing/trading in securities and for this purpose, the client is desirous of using either the internet based trading facility or the facility for securities trading through use of wireless technology. The Stock broker shall provide the Stock broker\'s IBT Service to the Client, and the Client shall avail of the Stock broker\'s IBT Service, on and subject to SEBI/Exchanges Provisions and the terms and conditions specified on the Stock broker\'s IBT Web Site provided that they are in line with the norms prescribed by Exchanges/SEBI.' },
    { type: 'num', num: '3.', text: 'The stock broker shall bring to the notice of client the features, risks, responsibilities, obligations and liabilities associated with securities trading through wireless technology/internet/smart order routing or any other technology should be brought to the notice of the client by the stock broker.' },
    { type: 'num', num: '4.', text: 'The stock broker shall make the client aware that the Stock Broker\'s IBT system itself generates the initial password and its password policy as stipulated in line with norms prescribed by Exchanges/SEBI.' },
    { type: 'num', num: '5.', text: 'The Client shall be responsible for keeping the Username and Password confidential and secure and shall be solely responsible for all orders entered and transactions done by any person whosoever through the Stock broker\'s IBT System using the Client\'s Username and/or Password whether or not such person was authorized to do so. Also the client is aware that authentication technologies and strict security measures are required for the internet trading/securities trading through wireless technology through order routed system and undertakes to ensure that the password of the client and/or his authorized representative are not revealed to any third party including employees and dealers of the stock broker' },
    { type: 'num', num: '6.', text: 'The Client shall immediately notify the Stock broker in writing if he forgets his password, discovers security flaw in Stock Broker\'s IBT System, discovers/suspects discrepancies/ unauthorized access through his username/password/account with full details of such unauthorized use, the date, the manner and the transactions effected pursuant to such unauthorized use, etc.' },
    { type: 'num', num: '7.', text: 'The Client is fully aware of and understands the risks associated with availing of a service for routing orders over the internet/securities trading through wireless technology and Client shall be fully liable and responsible for any and all acts done in the Client\'s Username/password in any manner whatsoever.' },
    { type: 'num', num: '8.', text: 'The stock broker shall send the order/trade confirmation through email to the client at his request. The client is aware that the order/ trade confirmation is also provided on the web portal. In case client is trading using wireless technology, the stock broker shall send the order/trade confirmation on the device of the client.' },
    { type: 'num', num: '9.', text: 'The client is aware that trading over the internet involves many uncertain factors and complex hardware, software, systems, communication lines, peripherals, etc. are susceptible to interruptions and dislocations. The Stock broker and the Exchange do not make any representation or warranty that the Stock broker\'s IBT Service will be available to the Client at all times without any interruption.' },
    { type: 'num', num: '10.', text: 'The Client shall not have any claim against the Exchange or the Stock broker on account of any suspension, interruption, non-availability or malfunctioning of the Stock broker\'s IBT System or Service or the Exchange\'s service or systems or non-execution of his orders due to any link/system failure at the Client/Stock brokers/Exchange end for any reason beyond the control of the stock broker/Exchanges.' },

    // Page 20
    { type: 'pageBreak', pageNum: 20 },
    { type: 'title', text: 'Annexure-5' },
    { type: 'subtitle', text: 'RISK DISCLOSURE DOCUMENT FOR CAPITAL MARKET AND DERIVATIVES SEGMENTS' },
    { type: 'text', text: 'This document contains important information on trading in Equities/Derivatives Segments of the stock exchanges. All prospective constituents should read this document before trading in Equities/Derivatives Segments of the Exchanges.' },
    { type: 'text', text: 'Stock exchanges/SEBI does neither singly or jointly and expressly nor impliedly guarantee nor make any representation concerning the completeness, the adequacy or accuracy of this disclosure document nor have Stock exchanges /SEBI endorsed or passed any merits of participating in the trading segments. This brief statement does not disclose all the risks and other significant aspects of trading.' },
    { type: 'text', text: 'In the light of the risks involved, you should undertake transactions only if you understand the nature of the relationship into which you are entering and the extent of your exposure to risk.' },
    { type: 'text', text: 'You must know and appreciate that trading in Equity shares, derivatives contracts or other instruments traded on the Stock Exchange, which have varying element of risk, is generally not an appropriate avenue for someone of limited resources/limited investment and/or trading experience and low risk tolerance. You should therefore carefully consider whether such trading is suitable for you in the light of your financial condition. In case you trade on Stock exchanges and suffer adverse consequences or loss, you shall be solely responsible for the same and Stock exchanges/its Clearing Corporation and/or SEBI shall not be responsible, in any manner whatsoever, for the same and it will not be open for you to take a plea that no adequate disclosure regarding the risks involved was made or that you were not explained the full risk involved by the concerned stock broker. The constituent shall be solely responsible for the consequences and no contract can be rescinded on that account. You must acknowledge and accept that there can be no guarantee of profits or no exception from losses while executing orders for purchase and/or sale of a derivative contract being traded on Stock exchanges.' },
    { type: 'text', text: 'It must be clearly understood by you that your dealings on Stock exchanges through a stock broker shall be subject to your fulfilling certain formalities set out by the stock broker, which may inter alia include your filling the know your client form, reading the rights and obligations, do\'s and don\'ts, etc., and are subject to the Rules, Byelaws and Regulations of relevant Stock exchanges, its Clearing Corporation, guidelines prescribed by SEBI and in force from time to time and Circulars as may be issued by Stock exchanges or its Clearing Corporation and in force from time to time.' },
    { type: 'text', text: 'Stock exchanges does not provide or purport to provide any advice and shall not be liable to any person who enters into any business relationship with any stock broker of Stock exchanges and/or any third party based on any information contained in this document. Any information contained in this document must not be construed as business advice. No consideration to trade should be made without thoroughly understanding and reviewing the risks involved in such trading. If you are unsure, you must seek professional advice on the same. In considering whether to trade or authorize someone to trade for you, you should be aware of or must get acquainted with the following:-' },
    { type: 'section', text: '1. BASIC RISKS:' },
    { type: 'num', num: '1.1', text: 'Risk of Higher Volatility: Volatility refers to the dynamic changes in price that a security/derivatives contract undergoes when trading activity continues on the Stock Exchanges. Generally, higher the volatility of a security/derivatives contract, greater is its price swings. There may be normally greater volatility in thinly traded securities / derivatives contracts than in active securities /derivatives contracts. As a result of volatility, your order may only be partially executed or not executed at all, or the price at which your order got executed may be substantially different from the last traded price or change substantially thereafter, resulting in notional or real losses.' },
    { type: 'num', num: '1.2', text: 'Risk of Lower Liquidity: Liquidity refers to the ability of market participants to buy and/or sell securities / derivatives contracts expeditiously at a competitive price and with minimal price difference. Generally, it is assumed that more the numbers of orders available in a market, greater is the liquidity. Liquidity is important because with greater liquidity, it is easier for investors to buy and/or sell securities / derivatives contracts swiftly and with minimal price difference, and as a result, investors are more likely to pay or receive a competitive price for securities / derivatives contracts purchased or sold. There may be a risk of lower liquidity in some securities / derivatives contracts as compared to active securities / derivatives contracts. As a result, your order may only be partially executed, or may be executed with relatively greater price difference or may not be executed at all.' },
    { type: 'num', num: '1.2.1', text: 'Buying or selling securities / derivatives contracts as part of a day trading strategy may also result into losses, because in such a situation, securities / derivatives contracts may have to be sold / purchased at low / high prices, compared to the expected price levels, so as not to have any open position or obligation to deliver or receive a security / derivatives contract.' },
    { type: 'num', num: '1.3', text: 'Risk of Wider Spreads: Spread refers to the difference in best buy price and best sell price. It represents the differential between the price of buying a security / derivatives contract and immediately selling it or vice versa. Lower liquidity and higher volatility may result in wider than normal spreads for less liquid or illiquid securities / derivatives contracts. This in turn will hamper better price formation.' },
    
    // Page 21
    { type: 'num', num: '1.4', text: 'Risk-reducing orders:\nThe placing of orders (e.g., "stop loss" orders, or "limit" orders) which are intended to limit losses to certain amounts may not be effective many a time because rapid movement in market conditions may make it impossible to execute such orders.' },
    { type: 'num', num: '1.4.1', text: 'A "market" order will be executed promptly, subject to availability of orders on opposite side, without regard to price and that, while the customer may receive a prompt execution of a "market" order, the execution may be at available prices of outstanding orders, which satisfy the order quantity, on price time priority. It may be understood that these prices may be significantly different from the last traded price or the best price in that security / derivatives contract.' },
    { type: 'num', num: '1.4.2', text: 'A "limit" order will be executed only at the "limit" price specified for the order or a better price. However, while the customer receives price protection, there is a possibility that the order may not be executed at all.' },
    { type: 'num', num: '1.4.3', text: 'A stop loss order is generally placed "away" from the current price of a stock / derivatives contract, and such order gets activated if and when the security / derivatives contract reaches, or trades through, the stop price. Sell stop orders are entered ordinarily below the current price, and buy stop orders are entered ordinarily above the current price. When the security / derivatives contract reaches the pre -determined price, or trades through such price, the stop loss order converts to a market/limit order and is executed at the limit or better. There is no assurance therefore that the limit order will be executable since a security / derivatives contract might penetrate the pre-determined price, in which case, the risk of such order not getting executed arises, just as with a regular limit order.' },
    { type: 'num', num: '1.5', text: 'Risk of News Announcements:\nNews announcements that may impact the price of stock / derivatives contract may occur during trading, and when combined with lower liquidity and higher volatility, may suddenly cause an unexpected positive movement in the price of the security / contract.' },
    { type: 'num', num: '1.6', text: 'Risk of Rumors:\nRumors about companies / currencies at times float in the market through word of mouth, newspapers, web sites or news agencies, etc. The investors should be wary of and should desist from acting on rumors.' },
    { type: 'num', num: '1.7', text: 'System Risk:\nHigh volume trading will frequently occur at the market opening and before market close. Such high volumes may also occur at any point in the day. These may cause delays in order execution or confirmation.' },
    { type: 'num', num: '1.7.1', text: 'During periods of volatility, on account of market participants continuously modifying their order quantity or prices or placing fresh orders, there may be delays in order execution and its confirmations.' },
    { type: 'num', num: '1.7.2', text: 'Under certain market conditions, it may be difficult or impossible to liquidate a position in the market at a reasonable price or at all, when there are no outstanding orders either on the buy side or the sell side, or if trading is halted in a security / derivatives contract due to any action on account of unusual trading activity or security / derivatives contract hitting circuit filters or for any other reason.' },
    { type: 'num', num: '1.8', text: 'System/Network Congestion:\nTrading on exchanges is in electronic R1ode, based on satellite/leased line based communications, combination of technologies and computer systems to place and route orders. Thus, there exists a possibility of communication failure or system problems or slow or delayed response from system or trading halt, or any such other problem/glitch whereby not being able to establish access to the trading system/network, which may be beyond control and may result in delay in processing or not processing buy or sell orders either in part or in full. You are cautioned to note that although these problems may be temporary in nature, but when you have outstanding open positions or unexecuted orders, these represent a risk because of your obligations to settle all executed transactions.' },
    { type: 'section', text: '2. As far as Derivatives segments are concerned, please note and get yourself acquainted with the\nfollowing additional features:-' },
    { type: 'num', num: '2.1', text: 'Effect of "Leverage" or "Gearing":\nIn the derivatives market, the amount of margin is small relative to the value of the derivatives contract so the transactions are \'leveraged\' or \'geared\'. Derivatives trading, which is conducted with a relatively small amount of margin, provides the possibility of great profit or loss in comparison with the margin amount. But transactions in derivatives carry a high degree of risk.\nYou should therefore completely understand the following statements before actually trading in derivatives and also trade with caution while taking into account one\'s circumstances, financial resources, etc. If the prices move against you, you may lose a part of or whole margin amount in a relatively short period of time. Moreover, the loss may exceed the original margin amount.' },
    { type: 'num', num: 'A.', text: 'Futures trading involve daily settlement of all positions. Every day the open positions are marked to market based on the closing level of the index / derivatives contract. If the contract has moved against you, you will be required to deposit the amount of loss (notional) resulting from such movement. This amount will have to be paid within a stipulated time frame, generally before commencement of trading on next day.' },
    { type: 'num', num: 'B.', text: 'If you fail to deposit the additional amount by the deadline or if an outstanding debt occurs in your account, the stock broker may liquidate a part of or the whole position or substitute securities. In this case, you will be liable for any losses incurred due to such close-outs.' },
    { type: 'num', num: 'C.', text: 'Under certain market conditions, an investor may find it difficult or impossible to execute transactions. For example, this situation can occur due to factors such as illiquidity i.e. when there are insufficient bids or offers or suspension of trading due to price limit or circuit breakers etc.' },
    { type: 'num', num: 'D.', text: 'In order to maintain market stability, the following steps may be adopted: changes in the margin rate, increases in the cash margin rate or others. These new measures may also be applied to the existing open interests. In such conditions, you will be required to put up additional margins or reduce your positions.' },
    { type: 'num', num: 'E.', text: 'You must ask your broker to provide the full details of derivatives contracts you plan to trade i.e. the contract specifications and the associated obligations.' },
    { type: 'num', num: '2.2', text: 'Currency specific risks:\n1. The profit or loss in transactions in foreign currency-denominated contracts, whether they are traded in your own or another jurisdiction, will be affected by fluctuations in currency rates where there is a need to convert from the currency denomination of the contract to another currency.\n2. Under certain market conditions, you may find it difficult or impossible to liquidate a position. This can occur, for example when a currency is deregulated or fixed trading bands are widened.\n3. Currency prices are highly volatile. Price movements for currencies are influenced by, among other things: changing supply-demand relationships; trade, fiscal, monetary, exchange control programs and policies of governments; foreign political and economic events and policies; changes in national and international interest rates and inflation; currency devaluation; and sentiment of the market place. None of these factors can be controlled by any individual advisor and no assurance can be given that an advisor\'s advice will result in profitable trades for a participating customer or that a customer will not incur losses from such events.' },
    { type: 'num', num: '2.3', text: 'Risk of Option holders:\n1. An option holder runs the risk of losing the entire amount paid for the option in a relatively short period of time. This risk reflects the nature of an option as a wasting asset which becomes worthless when it expires. An option holder who neither sells his option in the secondary market nor exercises it prior to its expiration will necessarily lose his entire investment in the option. If the price of the underlying does not change in the anticipated direction before the option expires, to an extent sufficient to cover the cost of the option, the investor may lose all or a significant part of his investment in the option.\n2. The Exchanges may impose exercise restrictions and have absolute authority to restrict the exercise of options at certain times in specified circumstances.' },
    { type: 'num', num: '2.4', text: 'Risks of Option Writers:\n1. If the price movement of the underlying is not in the anticipated direction, the option writer runs the risks of losing substantial amount.\n2. The risk of being an option writer may be reduced by the purchase of other options on the same underlying interest and thereby assuming a spread position or by acquiring other types of hedging positions in the options markets or other markets. However, even where the writer has assumed a spread or other hedging position, the risks may still be significant. A spread position is not necessarily less risky than a simple \'long\' or \'short\' position.\n3. Transactions that involve buying and writing multiple options in combination, or buying or writing options in combination with buying or selling short the underlying interests, present additional risks to investors. Combination transactions, such as option spreads, are more complex than buying or writing a single option. And it should be further noted that, as in any area of investing, a complexity not well understood is, in itself, a risk factor. While this is not to suggest that combination strategies should not be considered, it is advisable, as is the case with all investments in options, to consult with someone who is experienced and knowledgeable with respect to the risks and potential rewards of combination transactions under various market circumstances.' },
    { type: 'section', text: '3. TRADING THROUGH WIRELESS TECHNOLOGY: SMART ORDER ROUTING OR ANY OTHER TECHNOLOGY:' },
    { type: 'text', text: 'Any additional provisions defining the features, risks, responsibilities, obligations and liabilities associated with securities trading through wireless technology smart order routing or any other technology should be brought to the notice of the client by the stock broker.' },
    { type: 'section', text: '4 .GENERAL' },
    { type: 'num', num: '4.1', text: 'The term \'constituent\' shall mean and include a client, a customer or an investor, who deals with a stock broker for the purpose of acquiring and/or selling of securities / derivatives contracts through the mechanism provided by the Exchanges.' },
    { type: 'num', num: '4.2', text: 'The term \'stock broker\' shall mean and include a stock broker, a broker or a stock broker, who has been admitted as such by the Exchanges and who holds a registration certificate from SEBI.' },
    // Non Mandatory Document Cover
    { type: 'non_mandatory_cover' },
    // Page 22 - Annexure 6
    { type: 'pageBreak', pageNum: 22 },
    { type: 'title', text: 'Annexure-6' },
    { type: 'subtitle', text: 'GUIDANCE NOTE- DO\'s AND DON\'Ts FOR TRADING ON THE EXCHANGE(S) FOR INVESTORS' },
    { type: 'table_header', text: 'BEFORE YOU BEGIN TO TRADE' },
    { type: 'num', num: '1.', text: 'Ensure that you deal with and through only SEBI registered intermediaries. You may check their SEBI registration certificate number from the list available on the Stock exchanges www.nseindia.com / www.bseindia.com / www.mcx-sx.com and SEBI website www.sebi.gov.in.' },
    { type: 'num', num: '2.', text: 'Ensure that you fill the KYC form completely and strike off the blank fields in the KYC form.' },
    { type: 'num', num: '3.', text: 'Ensure that you have read all the mandatory documents viz. Rights and Obligations, Risk Disclosure Document, Policy and Procedure document of the stock broker.' },
    { type: 'num', num: '4.', text: 'Ensure to read, understand and then sign the voluntary clauses, if any, agreed between you and the stock broker. Note that the clauses as agreed between you and the stock broker cannot be changed without your consent.' },
    { type: 'num', num: '5.', text: 'Get a clear idea about all brokerage, commissions, fees and other charges levied by the broker on you for trading and the relevant provisions/ guidelines specified by SEBI/Stock exchanges.' },
    { type: 'num', num: '6.', text: 'Obtain a copy of all the documents executed by you from the stock broker free of charge.' },
    { type: 'num', num: '7.', text: 'In case you wish to execute Power of Attorney (POA) in favour of the Stock broker, authorizing it to operate your bank and demat account, please refer to the guidelines issued by SEBI/Exchanges in this regard.' },
    
    { type: 'table_header', text: 'TRANSACTIONS AND SETTLEMENTS' },
    { type: 'num', num: '8.', text: 'The stock broker may issue electronic contract notes (ECN) if specifically authorized by you in writing. You should provide your email id to the stock broker for the same. Don\'t opt for ECN if you are not familiar with computers.' },
    { type: 'num', num: '9.', text: 'Don\'t share your internet trading account\'s password with anyone.' },
    { type: 'num', num: '10.', text: 'Don\'t make any payment in cash to the stock broker.' },
    { type: 'num', num: '11.', text: 'Make the payments by account payee cheque in favour of the stock broker. Don\'t issue cheques in the name of sub-broker. Ensure that you have a documentary proof of your payment/ deposit of securities with the stock broker, stating date, scrip, quantity, towards which bank/demat account such money or securities deposited and from which bank/ demat account.' },
    { type: 'num', num: '12.', text: 'Note that facility of Trade Verification is available on stock exchanges\' websites, where details of trade as mentioned in the contract note may be verified. Where trade details on the website do not tally with the details mentioned in the contract note, immediately get in touch with the Investors Grievance Cell of the relevant Stock exchange.' },
    { type: 'num', num: '13.', text: 'In case you have given specific authorization for maintaining running account, payout of funds or delivery of securities (as the case may be), may not be made to you within one working day from the receipt of payout from the Exchange. Thus, the stock broker shall maintain running account for you subject to the following conditions:' },
    { type: 'num', num: 'a)', text: 'Such authorization from you shall be dated, signed by you only and contains the clause that you may revoke the same at any time.' },
    { type: 'num', num: 'b)', text: 'The actual settlement of funds and securities shall be done by the stock broker, at least once in a calendar quarter or month, depending on your preference. While settling the account, the stock broker shall send to you a \'statement of accounts\' containing an extract from the client ledger for funds and an extract from the register of securities displaying all the receipts/deliveries of funds and securities. The statement shall also explain the retention of funds and securities and the details of the pledged shares, if any.' },
    { type: 'num', num: 'c)', text: 'On the date of settlement, the stock broker may retain the requisite securities/funds towards outstanding obligations and may also retain the funds expected to be required to meet derivatives margin obligations for next 5 trading days, calculated in the manner specified by the exchanges. In respect of cash market transactions, the stock broker may retain entire pay-in obligation of funds and securities due from clients as on date of settlement and for next day\'s business, he may retain funds/securities/margin to the extent of value of transactions executed on the day of such settlement in the cash market.' },
    { type: 'num', num: 'd)', text: 'You need to bring any dispute arising from the statement of account or settlement so made to the notice of the stock broker in writing preferably within 7 (seven) working days from the date of receipt of funds/securities or statement, as the case may be. In case of dispute, refer the matter in writing to the Investors Grievance Cell of the relevant Stock exchanges without delay.' },
    { type: 'num', num: '14.', text: 'In case you have not opted for maintaining running account and pay-out of funds/securities is not received on the next working day of the receipt of payout from the exchanges, please refer the matter to the stock broker. In case there is dispute, ensure that you lodge a complaint in writing immediately with the Investors Grievance Cell of the relevant Stock exchange.' },
    { type: 'num', num: '15.', text: 'Please register your mobile number and email id with the stock broker, to receive trade confirmation alerts/ details of the transactions through SMS or email, by the end of the trading day, from the stock exchanges.' },
    
    { type: 'table_header', text: 'IN CASE OF TERMINATION OF TRADING MEMBERSHIP' },
    { type: 'num', num: '16.', text: 'In case, a stock broker surrenders his membership, is expelled from membership or declared a defaulter; Stock exchanges gives a public notice inviting claims relating to only the "transactions executed on the trading system" of Stock exchange, from the investors. Ensure that you lodge a claim with the relevant Stock exchanges within the stipulated period and with the supporting documents.' },
    { type: 'num', num: '17.', text: 'Familiarize yourself with the protection accorded to the money and/or securities you may deposit with your stock broker, particularly in the event of a default or the stock broker\'s insolvency or bankruptcy and the extent to which you may recover such money and/or securities may be governed by the Bye-laws and Regulations of the relevant Stock exchange where the trade was executed and the scheme of the Investors\' Protection Fund in force from time to time.' },
    
    { type: 'table_header', text: 'DISPUTES/ COMPLAINTS' },
    { type: 'num', num: '18.', text: 'Please note that the details of the arbitration proceedings, penal action against the brokers and investor complaints against the stock brokers are displayed on the website of the relevant Stock exchange.' },
    { type: 'num', num: '19.', text: 'In case your issue/problem/grievance is not being sorted out by concerned stock broker/sub-broker then you may take up the matter with the concerned Stock exchange. If you are not satisfied with the resolution of your complaint then you can escalate the matter to SEBI.' },
    { type: 'num', num: '20.', text: 'Note that all the stock broker/sub-brokers have been mandated by SEBI to designate an e-mail ID of the grievance redressal division/compliance officer exclusively for the purpose of registering complaints.' },
    
    // Page 25
    { type: 'pageBreak', pageNum: 25 },
    { type: 'title', text: 'POLICIES & PROCEDURE' },
    { type: 'num_bold', num: 'a)', title: 'Policy for Penny Stock', text: 'Penny Stock is a stock that trades at a relatively low price and has very low market capitalization. These types of stocks are generally considered to be highly speculative and high risk because of their lack of liquidity, large bid-ask spreads, small capitalization, limited following and inade quote disclosure. Depending on the market condition and RMS (Risk Management System) policy of the company, the company reserve the right to refuse to provide the facility of trading in penny stock.' },
    { type: 'num_bold', num: 'b)', title: 'Setting up client\'s exposure limits', text: 'Vivek Financial Focus Ltd. may from time to time impose and vary limits (including exposure limits, turnover limits, limits as to the number, value and/or kind of securities in respect of which orders can be placed etc.) on the orders that the client can place through the stock broker\'s trading system. The client is aware and agrees that Vivek Financial Focus Ltd. may need to vary or reduce the limits or impose new limits urgently on the basis of the stock broker\'s risk perception and other factors considered relevant by Vivek Financial Focus Ltd. including but not limited to limits on account of exchange/SEBI directions/limits (such broker level/market level limits in security specific/volume specific exposures etc.), and Vivek Financial Focus Ltd. may be unable to inform the client of such variation, reduction or imposition in advance. The client agrees that Vivek Financial Focus Ltd. shall not be responsible for such variation, reduction or imposition or the client\'s inability to route any order through the stock broker\'s trading system on account of any such variation, reduction or imposition of limits. The client further agrees that Vivek Financial Focus Ltd. may at any time, at its sole discretion and without prior notice, prohibit or restrict the client\'s ability to place orders or trade in securities through the stock broker, or it may subject any order placed by the client to a review before its entry into the trading systems and may refuse to execute/allow execution of orders due to but not limited to the reason of lack of margin/securities or the order being outside the limits set by stock broker/exchange/SEBI and any other reasons which Vivek Financial Focus Ltd. may deem appropriate in the circumstances. The client agrees that the losses, if any on account of such refusal or due to delay caused by such review, shall be borne exclusively by the client alone.\nVivek Financial Focus Ltd. may shift to margin based RMS system. Total deposits of the clients would be uploaded in the system and client may take exposure on the basis of margin applicable for respective security as per VAR based margining system of the stock exchange and/or margin defined by RMS based on their risk perception. Client may take benefit of "credit for sale" i.e. benefit of share held as margin by selling the same by selecting Delivery option through order entry window on the trading platform, the value of share sold will be added with the value of deposit and on the basis of that client may take fresh exposure.\nIn case of exposure taken on the basis of shares margin the payment is required to be made before the exchange pay in date otherwise it will be liable to square off after the pay in time or any time due to shortage of margin.' },
    { type: 'num_bold', num: 'c)', title: 'Applicable brokerage rate :-', text: 'Brokerage will be charged within the limits prescribed by SEBI/Exchange.' },
    { type: 'num_bold', num: 'd)', title: 'Imposition of penalty / delayed payment charges', text: 'Clients will be liable to pay late pay in/delayed payment charges for not making payment of their payin/margin obligation on time as per the exchange requirement/schedule at the rate of 2% per month or at agreed rate. Similarly Vivek Financial Focus Ltd. will also be liable to pay delayed payment charges to the client for not making payment of their obligation on time, as per the exchange requirement/schedule at the rate of 2% p.m. or at agreed rate, except in the cases covered by the "Running Account Authorisation" given by the client to the stock broker from the date of request from the client and which can be substantiated, demanded and proved to be on account of failure on part of T.M.\nHowever it is made clear that it is the responsibility of the client to collect the payment from the broker office and deposit the same in his bank and in case of any failure on his past to do so, the broker shall not be held responsible.\nThe client agrees that Vivek Financial Focus Ltd. may impose fines / penalties for any orders / trades / deals / actions of the client which are contrary to this agreement /rules / regulations / bye laws of the exchange or any other law for the time being in force, at such rates and in such form as it may deem fit. Further where Vivek Financial Focus Ltd. has to pay any fine or bear any punishment from any authority in connection with / as a consequence of / in relation to any of the orders / trades / deals / actions of the client, the same shall be borne by the client.' },
    { type: 'num_bold', num: 'e)', title: 'The right to sell client\'s securities or close clients\' positions, without giving notice to the client, on account of non-payment of client\'s dues', text: 'Without prejudice to the stock brokers other right (including the right to refer the matter to arbitration), Vivek Financial Focus Ltd. shall be entitled to liquidate/close out all or any of the clients position without giving notice to the client for non payment of margins or other amounts including the pay in obligation, outstanding debts etc and adjust the proceeds of such liquidation/close out, if any, against the clients liabilities/obligations.\nThe client shall ensure timely availability of funds/securities in form and manner at designated time and in designated bank and depository account(s), for meeting his/her/its pay in obligation of funds and securities. Any and all losses and financial charges on account of such liquidations/ closing out shall be charged to & born by the client. In cases of securities lying in margin account/client beneficiary account and having corporate actions like Bonus, Stock split, Right issue etc, for margin or other purpose the benefit of shares due to received under Bonus, Stock split, Right issue etc will be given when the shares is actually received in the stock broker designated demat account.\nIn case the payment of the margin / security is made by the client through a bank instrument, the stock broker shall be at liberty to give the benefit / credit for the same only on the realization of the funds from the said bank instrument etc, at the absolute discretion of Vivek Financial Focus Ltd. Where the margin / security is made available by way of securities or any other property, the stock broker is empowered to decline its acceptance as margin / security &/or to accept it at such reduced value as the stock broker may deem fit by applying haircuts or by valuing it by marking it to market or by any other method as the stock broker may deem fit in its absolute discretion.\nVivek Financial Focus Ltd. has the right but not the obligation, to cancel all pending orders and to sell/close/liquidate all open positions/securities/ shares at the pre-defined square off time or when Mark to Market (M-T-M) percentage reaches or crosses stipulated margin percentage, whichever is earlier. Vivek Financial Focus Ltd. will have sole discretion to decide referred stipulated margin percentage depending upon the market condition. In the event of such square off, the client agrees to bear all the losses based on actual executed prices, the client shall also be solely liable for all and any penalties and charges levied by the exchange(s).' },
    { type: 'num_bold', num: 'f)', title: 'Shortages in obligations arising out of Auction/Process/inculding internal netting of trades', text: 'The policy and procedure for settlement of shortages in obligations arising out of internal netting of trades is identical to that followed by the Exchange for the shortage by the client which is as under:\na) The Short delivering client is debited by an amount equivalent to 20% above of closing rate of day prior to Payin/Payout Day. The securities delivered short are purchased from market on T+2 day and the purchase consideration (inclusive of all statutory taxes & levies) is debited to the short delivering seller client along with reversal entry of provisionally amount debited earlier.\nb) If securities cannot be purchased by the Exchange/s from market due to any force majeure condition, the short delivering seller is debited at the closing rate on T+2 day or Auction day on Exchange +20% where the delivery and debits/credits. However, in case of netting of transactions at Brokers\' end, such transactions are squared off by adding 10% on highest price at Exchange/s on the day of auction to the seller account as penalty.\nc) In cases of securities having corporate actions all cases of short delivery of cum transactions which cannot be auctioned on cum basis or where the cum basis auctioned on cum basis or where the cum basis auction payout is after the book closure/record date, would be compulsory closed out at higher of 10% above the official closing price on the auction day or the highest traded price from first trading day of the settlement till the auction day.\nd) If securities shortage is settlement type TFT/T2T. The short delivery seller is debited at the high rate trade day to previous day of pay in day or 20% above all official close of previous day which ever is higher.' },
    { type: 'num_bold', num: 'g)', title: 'Conditions under which a client may not be allowed to take further position or the broker may close the existing position of a client', text: 'Client may take exposure as allowed by us. Client may not be allowed to take position in case of non-availability/shortage of margin as per our RMS policy of the company. The existing position of the client is also liable to square off/close out without giving notice due to shortage of margin/ non making of payment for their pay in obligation/outstanding debts.' },
    { type: 'num_bold', num: 'h)', title: 'Temporarily suspending or closing a client\'s account at the client\'s request', text: 'On the request of the client, the client account can be suspended temporarily and same can be activated on the request of the client only. During the period client account is suspended, the market transaction in the client account will be prohibited. However client shares/ledger balance settlement can take place.\nOn the request of the client, the client account can be closed provided the client account is settled. However, we may reopen the account in case of the request by the client.' },
    { type: 'num_bold', num: 'i)', title: 'Deregistering a client :-', text: 'Notwithstanding anything to the contrary stated in the agreement, Vivek Financial Focus Ltd. shall be entitled to terminate the agreement with immediate effect in any of the following circumstances.\n(i) If the action of the client are prima facie illegal / improper or such as to manipulate the price of any securities or disturb the normal/proper functioning of the market, either alone or in conjunction with others.\n(ii) If there is any commencement of a legal process against the client under any law in force;\n(iii) On the death/lunacy or other disability of the Client;\n(iv) If the client being a partnership firm, has any steps taken by the Client and/or its partners for dissolution of the partnership;\n(v) If the Client suffers any adverse material change in his/her/its financial position or defaults in any other agreement with the Stock broker;\n(vi) If there is reasonable apprehension that the Client is unable to pay its debts or the Client has admitted its inability to pay its debts, as they become payable;\n(vii) If the Client is in breach of any term, condition or covenant of this Agreement;\n(viii) If the Client has made any material mis-representation of facts, including (without limitation) in relation to the Security;\n(ix) If a receiver, administrator or liquidator has been appointed or allowed to be appointed of all or any part of the undertaking of the Client;\n(x) If the Client have taken or suffered to be taken any action for its reorganization, liquidation or dissolution;\n(xi) If the Client has voluntarily or compulsorily become the subject of proceedings under any bankruptcy or insolvency law or being a company, goes into liquidation or has a receiver appointed in respect of its assets or refers itself to the Board for Industrial and Financial Reconstruction or under any other law providing protection as a relief undertaking;\n(xii) If any covenant or warranty of the Client is incorrect or untrue in any material respect;\n(xiii) If the client is found to be of alcholic/intoxication tendencies, agressive/abusive behaviour or general behaviour not compactible to that of civilised person.' },
    { type: 'num_bold', num: '', title: 'Inactive Client account:', text: '- Client account will be considered as inactive if the client does not trade for period of one year. Calculation will be done at the beginning of every month and those clients who have not traded even a single time will be considered as inactive, the shares/ credit ledger balance if any will be transferred to the client within one week of the identifying the client as inactive. The client has to make written request for reactivation of their account.' },
    { type: 'num_bold', num: '', title: 'Communication Failure, System Problems :', text: '- Trading in Exchange is in Electronic Mode, based on VSAT, leased line, ISDN, Modem and VPN, combination of technologies and computer systems to place and route orders. I/we understand that there exists a possibility of communication failure or system problems or slow or delayed response from system or trading halt or any break down in our back office/ front end system, or any such other problem/glitch whereby not being able to establish access to the trading system/network, which may be beyond your control and may result in delay in processing or not processing buy or sell Orders either in part or in full. I/We shall be fully liable and responsible for any such problem/fault.' },
    { type: 'num_bold', num: '', title: 'Settlement of Obligations to Clients :', text: '- Vivek Financial Focus Ltd. shall not be obliged to deliver any securities or pay any money to the client unless and until the same has been received by Vivek Financial Focus Ltd. from the exchange, the clearing corporation or other company or entity liable to make the payment and the client has fulfilled his/her/its obligations first.' },
    { type: 'num_bold', num: '', title: 'Client Acceptance of Policies and Procedures stated hereinabove:', text: 'I/We have fully understood the same and do hereby sign the same and agree not to call into question the validity, enforceability and applicability of any provision/clauses this document any circumstances what so ever. These Policies and Procedures may be amended / changed unilaterally by Vivek Financial Focus Ltd., provided the change is informed to me / us with through any one or more means or methods. I/we agree never to challenge the same on any grounds including delayed receipt / non receipt or any other reasons whatsoever. These Policies and Procedures shall always be read along with the agreement and shall be compulsorily referred to while deciding any dispute / difference or claim between me / us and Vivek Financial Focus Ltd. before any court of law / judicial / adjudicating authority including arbitrator / mediator etc.' },
    { type: 'num_bold', num: '', title: 'Change in the above Policies and Procedure, if any, shall be done by Vivek Financial Focus Ltd. By giving 15 days notice to the client.', text: '' }
    ,
