    { type: 'kyc_non_individual_pages' },
    { type: 'pageBreak', pageNum: 30 },
    { type: 'title', text: 'AFFIRMATIONS, DECLARATIONS AND UNDERTAKINGS BY THE CLIENT' },
    { type: 'text', text: 'The understanding about the various issues which are involved in dealings between the client and Vivek Financial Focus Ltd. (Vivek Financial) in addition to the matters specified by SEBI under Annexure 4, 5 and 6 of Account Opening Kit is being hereby reduced in writing to ensure that the right understanding prevails and also to facilitate ease of operations. Any provisions/ regulations prescribed/ to be prescribed by SEBI/ Stock Exchanges/ any other statutory authorities shall prevail in case of any contradictions contained hereunder.\n\nThe client is aware, understands, agrees, states, expresses, confirms, declares and authorises:' },
    { type: 'num', num: '1.', text: 'That the client is eligible to enter into a "Contract" under all the applicable laws including but not limited to Contract Act, SEBI, FEMA, Income Tax, PMLA and any other act/ laws/ rules and regulations in force. The client neither has been involved in any terrorist activity nor has been not been declared as defaulter/ name appearing in defaulter database as per SEBI/ various exchanges/ regulatory bodies/ CIBIL (Credit Information Bureau of India Ltd.).' },
    { type: 'num', num: '2.', text: 'That there exist certain regulations/ restrictions on investments.' },
    { type: 'num', num: '3.', text: 'That the client in regard to investments by foreign entities/ persons including NRI shall ensure that the investments made are in accordance with prevailing regulations especially under FEMA and/ or RBI Regulations etc.' },
    { type: 'num', num: '4.', text: 'That the client shall keep him updated about the changes brought in by SEBI/ Stock Exchanges and other competent statutory authorities from time to time having a bearing upon the relationship between the client and Vivek Financial and also on his investments.' },
    { type: 'num', num: '5.', text: 'That the client shall deal only for himself, his family members or on behalf of an other entity for which he is duly authorised and would neither act as a proxy for any other entity nor as a sub-broker/ intermediary.' },
    { type: 'num', num: '6.', text: 'That the client does not deal through Vivek Financial on the Stock Exchanges of which the client himself is a broker/ sub-broker.' },
    { type: 'num', num: '7.', text: 'That the client is \'Principal\' and Vivek Financial is an \'Agent\' to the client.' },
    { type: 'num', num: '8.', text: 'While acting as an agent, Vivek Financial may disseminate to the client any information, research opinion or advice whether of its own or any other agency about the matters considered to be vital for investments by the client. Such dissemination neither means that Vivek Financial assumes the responsibility for actions taken by the client based upon this type of information nor in any way alters the relationship of \'Principal\' and \'Agent\'. Vivek Financial does neither provide any advisory/ consultancy for investments nor is responsible for any profit/ loss which may be incurred by the client. The client shall independently validate the veracity of information received from Vivek Financial, decides its compatibility to his personal investment requirements and assume the consequential risks upon him. Under no circumstances, the client would ever make a claim that any loss to him have been arisen out of the information/ advice which he had solicited/ relied upon; from any of the employees/ agents/ sub-brokers of Vivek Financial. Further, the information received by the client shall be purely for his personal use and the same cannot be put to any commercial use whatsoever.' },
    { type: 'num', num: '9.', text: 'It would be a deliberate criminal contravention by the client if the client makes any arrangement with any of the employees/ agents/ sub-brokers of Vivek Financial for investments/ profit and loss by allowing trading in his (client\'s) account. This shall be unequivocally a personal and private arrangement between the client and the other person. It is abundantly clear to the client that Vivek Financial is not responsible for any losses/ liabilities incurred by the client for any of his decisions. The client indemnifies Vivek Financial against any misdemeanour.' },
    { type: 'num', num: '10.', text: 'That the client authorises Vivek Financial to send information relating to transactions, products etc. through SMS/ emails/ post etc. This is an express authority by the client to Vivek Financial for such transmissions and therefore all the transmissions and communications will not be considered as breach of "National Do Not Call Registry" and any other related regulations/ laws including but not limited to SPAM.' },
    { type: 'num', num: '11.', text: 'That the opening of account with Vivek Financial does not give the client an absolute right to demand any service. Vivek Financial in its discretion would decide whether to provide or not to provide the client with service/s and/ or the quantum of its service/s subject to the prevailing regulatory requirements.' },
    { type: 'num', num: '12.', text: 'That any order/ mandate given by the client whether executed by Vivek Financial on behalf of the client or by the client himself directly in the appropriate system including trading platform of the Stock Exchanges becomes enforceable only on its being accepted by the relevant systems. Therefore, Vivek Financial is not responsible for any failure in execution owing to any reason whatsoever whether technical or human.' },
    
    // Page 31
    // Page 31 (Removed forced break to allow natural flow)
    // { type: 'pageBreak', pageNum: 31 },
    { type: 'num_bold', num: '13.', title: 'VERBAL ORDER ACCEPTANCE AUTHORISATION', text: 'That the client may place his order in person or by the use of any other media such as email, SMS and postal services etc. as opted by him. It is in the knowledge of the client that the written orders (placing, modification or cancellation) are the safest mode to avoid any confusion/ misunderstanding. However, owing to the volatility in the prices, it becomes impracticable due to distance and other reasons. Therefore, the verbal order given personally or telephonically would be considered as a written instruction. The client understands the risk associated with verbal orders and accepts the same and agrees that the client is neither entitled to disown orders and consequential trades nor have the right to shift the burden of proof by asking Vivek Financial to prove the placement of such verbal orders and accepts that the client shall be liable for all losses, damages and actions which may arise as a consequence of carrying his verbal orders. Further, Vivek Financial shall give all the confirmations on telephone unless instructed otherwise in writing. Furthermore, the client authorises Vivek Financial not to provide Order Confirmation/ Modification/ Cancellation slips to avoid unnecessary paper work in view of the fact that the details required by the client are available in the contract notes.' },
    { type: 'num', num: '14.', text: 'That the client is responsible to obtain the status and outcome of its orders from Vivek Financial. Further, the client shall ensure timely compliance for the consequential actions such as paying the money and securities to complete or settle the transactions arising out of such orders. Any failure to do so results in losses which shall be borne by client.' },
    { type: 'num_bold', num: '15.', title: 'AUTHORISATION FOR ELECTRONIC CONTRACT NOTE', text: 'That Vivek Financial shall give trade confirmations through telephone/ SMS/ email etc. The contract note would be sent at the registered address of the client through post/ courier or by the way of email, fax or by putting these on web servers. Vivek Financial is not responsible for non receipt/ delivery owing to any change in the address of the client which has not been intimated in writing. The contract note shall be deemed to have been properly delivered or served even if communication is returned as unclaimed/ refused/ undelivered. It is client\'s responsibility to review these immediately upon their receipt.' },
    { type: 'num', num: '16.', text: 'That all the money transactions are settled through account payee cheques only. The cheques would be favouring \'Vivek Financial Focus Ltd. - Client A/c\'. No cash is accepted.' },
    { type: 'num', num: '17.', text: 'a. That Vivek Financial maintains books of accounts on combined ledger principle i.e. collectively for all segments of all exchanges and any other segment or service for which the client has an arrangement to deal through/ with Vivek Financial. However, Vivek Financial shall be within its rights to demand sums due separately for any specific segment and/ or exchange if it so deems fit in its absolute discretion. Vivek Financial is authorised to net off/ adjust client\'s credit and/ or debit balances against the monies receivable/ payable from its various entities by way of appropriate accounting entries.\nb. That Vivek Financial shall have a general lien on all the monies, securities or other properties which Vivek Financial may hold on client\'s account including the account of family members/ related entities such as spouse/ relative or any company in which the client is a director or substantial shareholder or common director in companies for the discharge of client\'s obligations to Vivek Financial. The required permission and resolutions/ authorisations for these adjustments are presumed to have been obtained by the client as per the law.\nc. That Vivek Financial is entitled to use the client\'s collateral/ margins/ securities for availing exposure/ funds from time to time.' },
    { type: 'num', num: '18.', text: 'That Vivek Financial shall charge the client with a penalty of \'Delayed Payment Charges\' upto @ 24% per annum on failure of the client to pay in time.' },
    { type: 'num', num: '19.', text: 'That Vivek Financial shall debit the client account with depository service charges, other banking charges such as on dishonour of cheque, stop payment instructions, any remittance charges such as for NEFT/ RTGS and all other charges for the services such as research etc. as may become applicable from time to time.' },
    { type: 'num', num: '20.', text: 'That the client shall not indulge into any actions contrary to the normal personal trading requirements as are acceptable under the prevailing regulations. Where the purpose seems to be other than pure personal investing such as price manipulations etc., Vivek Financial has a right to hold back any payouts to the client on suspicion of such activities by the client besides the right for recovery of any penalties imposed by the authorities in due course for these activities in addition to the damages as may be considered appropriate.' },
    { type: 'num_bold', num: '21.', title: 'RUNNING ACCOUNT AUTHORISATION', text: 'That the client shall maintain a \'Running Account\', allow the use of securities and funds at any segment(s) of any or all the exchange(s) and his preference for settlement of funds and securities is Once in Calendar Month [ ] or Once in Calendar Quarter [ ] or such other higher period as allowed by SEBI/ Stock Exchange. However, where there are outstanding obligations' },
    { type: 'date_and_signature_left', label: 'Signature of the Applicant' },

    { type: 'text', text: 'on the settlement date, the required securities/ funds to meet such obligations along with obligations for next five days to be calculated in accordance with the method specified by the exchange/s would be retained. Any discrepancy shall be intimated in writing to Vivek Financial within seven working days. This \'Running Account Authorisation\' shall continue and would remain valid until it is revoked in writing by the client.' },

    // Page 32
    { type: 'pageBreak', pageNum: 32 },
    { type: 'num', num: '22.', text: 'That all the documents/ transmission like account statement for funds and securities would be sent to registered address/ email ID. The dispatch/ transmission through third party resources would be deemed as sufficient compliance. In case of any errors, the same shall be brought to the notice of Vivek Financial immediately and if these are not rectified by the end of the next working day, the same would be given in writing against due acknowledgement.' },
    { type: 'num', num: '23.', text: 'That the records maintained and provided by Vivek Financial shall be conclusive and binding for all purposes without prejudice to the right of correcting any discrepancies/ differences which might have crept in owing to any inadvertent human/ system error etc. at any time.' },
    { type: 'num_bold', num: '24.', title: 'STANDING INSTRUCTION', text: 'That Vivek Financial has all the rights to adjust the credit balance available in the client\'s account of any segment against any debit balance of any segment outstanding in the account of all the following related accounts i.e. family members, HUF, Company etc. S. No. Client Code of Family Member/ Associates Name of Family Member/ Associate' },
    { type: 'num', num: '25.', text: 'That the client shall always hand over his DP account Delivery Instruction Slip duly filled against proper acknowledgement. Under no circumstances, the client should give a blank DIS to anyone. Handing over of blank slip is entirely at the risk of the client.' },
    { type: 'num', num: '26.', text: 'That the client shall take adequate and sufficient security precautions to safeguard against any misuse of its password etc. which have been provided for access to transact/ obtain information. The facilities so provided can purely be used for the permitted purposes.' },
    { type: 'num', num: '27.', text: 'That the client shall upgrade at its own cost his computers/ connectivity equipment etc. if such changes are necessitated owing to the changes in the systems by Stock Exchanges/ Vivek Financial.' },
    { type: 'num', num: '28.', text: 'That in case of any dispute, the client necessarily has to first exhaust the remedies as available to the client under SEBI/ Stock Exchanges regulations before approaching the other statutory authorities including Police/ Courts.' },
    { type: 'num', num: '29.', text: 'That Vivek Financial can record all its interactions with the client through any electronic media and may keep the same in record for such time as considered appropriate.' },
    { type: 'num', num: '30.', text: 'That Vivek Financial has informed the client in accordance with Stock Exchange(s) regulations that Vivek Financial trade on behalf of the clients and also on their own account.' },
    { type: 'num', num: '31.', text: 'That any loss due to any erroneous order entry / modification shall be entertained by Vivek Financial only to the extent of insurance claim received.' },
    { type: 'num', num: '32.', text: 'That Vivek Financial is not responsible for any fraud committed by its employees.' },
    { type: 'num', num: '33.', text: 'In the eventuality of death/ dissolution/ winding up, the client agrees that the legal heirs will continue to be liable for full payment of all monies payable and/ or due to Vivek Financial. In the case of any merger/ amalgamation and reorganisation, Vivek Financial rights and obligations would pass on to the new entity.' },
    { type: 'num', num: '34.', text: 'That the client has provided the information which is true to the best of his knowledge and would ensure the same truthfulness for all the information which the client may have to provide from time to time in future. Vivek Financial shall share this information with any statutory authority entitled and competent to ask for such information.' },
    { type: 'text', text: '' },
    { type: 'num_bold', num: '', title: 'Any clause in above which is non-confirming to the client\'s need may be struck off.', text: '' },
    { type: 'text', text: '' },
    { type: 'num_bold', num: '', title: 'The client declares that the above mentioned submissions are true, correct and binding.', text: '' },

    // Page 33
    { type: 'pageBreak', pageNum: 33 },
    { type: 'annexure_a_header' },
    { type: 'num_bold', num: '', title: 'Annexure A-Framework on Voluntary Freezing/Blocking of the Trading Account', text: '' },
    { type: 'text', text: 'As per the SEBI circular SEBI/HO/MIRSD/POD-1/P/CIR/2024/4 dated 12th January 2024 and Exchange circulars NSE/INSP/61529 and 20240408-12 dated 08th April 2024 on the framework for trading members to provide the facility of voluntary freezing/ blocking the online access of Trading Account to Clients, Vivek Financial Focus Limited will accept requests for freezing/blocking of trading account from the clients as per the any 2 modes prescribed in the circular. After proper validation, the customer account will be frozen/blocked for online access. The request for freezing/ blocking does not constitute a request for marking the client Unique Client Code (UCC) as inactive in the Exchange records.\n\nThe client\'s open pending orders, if any, in Equity (Cash) or Derivatives will be canceled after conducting proper due diligence on the client\'s request to freeze of online trading account and the client will be informed that the online access to the trading account has been frozen / blocked as per the Exchange circular.\n\nFurther, the client will not be able to place any new orders or square off the open position from either web or app. The client will be informed about the open position, if any, along with contract expiry information. In case a client wants to square off the open positions, the client will be required to reach out to our customer service team to give the square off instructions. The customer service team will inform the risk team about the square-off instruction received from the client.\n\nTill the time the trading account is frozen, only square off orders will be allowed through RMS on either client request or will be initiated by the RMS team based on margin shortfall or to recover the debit in client ledger or due to non availability of physical delivery or any other such scenario as per the Risk management policy.\n\nFor unfreezing the account, before re-enabling the online access of the trading account, proper due diligence including validating the client request for unfreezing/unblocking the online access of the trading account will be carried out.\n\nFreezing/blocking is only for online access to the client\'s trading account, and there shall be no restrictions on the Risk Management activities of the Trading Member.\n\nThe detailed process for freezing and unfreezing online trading accounts will be communicated to the existing clients and will also be a part of the account opening form w.e.f 01 July 2024. Additionally, it will be published on our website.' },
    { type: 'annexure_a_signature' },
    { type: 'annexure_a_footer' },

          // Page 34
      { type: 'pageBreak', pageNum: 34 },
      { type: 'mitc_header' },
    { type: 'num', num: '1.', text: 'Your trading account has a "Unique Client Code" (UCC), different from your demat account number. Do not allow anyone (including your own stock broker, their representatives and dealers) to trade in your trading account on their own without taking specific instruction from you for your trades. Do not share your internet/ mobile trading login credentials with anyone else.' },
    { type: 'num', num: '2.', text: 'You are required to place collaterals as margins with the stock broker before you trade. The collateral can either be in the form of funds transfer into specified stock broker bank accounts or margin pledge of securities from your demat account. The bank accounts are listed on the stock broker website. Please do not transfer funds into any other account. The stock broker is not permitted to accept any cash from you.' },
    { type: 'num', num: '3.', text: 'The stock broker\'s Risk Management Policy provides details about how the trading limits will be given to you, and the tariff sheet provides the charges that the stock broker will levy on you.' },
    { type: 'num', num: '4.', text: 'All securities purchased by you will be transferred to your demat account within one working day of the payout. In case of securities purchased but not fully paid by you, the transfer of the same may be subject to limited period pledge i.e. seven trading days after the pay-out (CUSPA pledge) created in favor of the stock broker. You can view your demat account balances directly at the website of the Depositories after creating a login.' },
    { type: 'num', num: '5.', text: 'The stock broker is obligated to deposit all funds received from you with any of the Clearing Corporations duly allocated in your name. The stock broker is further mandated to return excess funds as per applicable norms to you at the time of quarterly/ monthly settlement. You can view the amounts allocated to you directly at the website of the Clearing Corporation(s).' },
    { type: 'num', num: '6.', text: 'You will get a contract note from the stock broker within 24 hours of the trade.' },
    { type: 'num', num: '7.', text: 'You may give a one-time Demat Debit and Pledge Instruction (DDPI) authority to your stock broker for limited access to your demat account, including transferring securities, which are sold in your account for pay-in.' },
    { type: 'num', num: '8.', text: 'The stock broker is expected to know your financial status and monitor your accounts accordingly. Do share all financial information (e.g. income, networth, etc.) with the stock broker as and when requested for. Kindly also keep your email Id and mobile phone details with the stock broker always updated.' },
    { type: 'num', num: '9.', text: 'In case of disputes with the stock broker, you can raise a grievance on the dedicated investor grievance ID of the stock broker. You can also approach the stock exchanges and/or SEBI directly.' },
    { type: 'num', num: '10.', text: 'Any assured/guaranteed/fixed returns schemes or any other schemes of similar nature are prohibited by law. You will not have any protection/recourse from SEBI/stock exchanges for participation in such schemes.' },
    { type: 'three_signatures_solid' },

document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const getParam = (name) => params.get(name);
    
    if (params.has('pan')) {
        const el = document.querySelector('input[name="pan"]');
        if (el) el.value = getParam('pan');
    }
    if (params.has('name')) {
        const el = document.querySelector('input[name="applicantName"]');
        if (el) el.value = getParam('name');
    }
    if (params.has('placeOfIncorporation')) {
        const el = document.querySelector('input[name="incorporationPlace"]');
        if (el) el.value = getParam('placeOfIncorporation');
    }
    if (params.has('status')) {
        const el = document.querySelector('select[name="status"]');
        if (el) {
            const val = getParam('status').toLowerCase();
            Array.from(el.options).forEach(opt => {
                if (opt.value.toLowerCase() === val || opt.text.toLowerCase() === val) {
                    el.value = opt.value;
                }
            });
        }
    }
});
function renderVivekNonIndividualKycPage(doc, data, PW, PH, M, RIGHT_X, CONTENT_W) {
  doc.addPage();

  const mm = 2.8346456693;
  const x = value => value * mm;
  const pageW = 210;
  const margin = 10;
  let y = 10;

  const applicantName = (data.applicantName || [data.firstName, data.middleName, data.lastName].filter(Boolean).join(' ')).toUpperCase();
  const val = key => String(data[key] || '').toUpperCase();
  const emailVal = key => String(data[key] || '');

  const setFont = (size, style) => doc.setFont('helvetica', style || 'normal').setFontSize(size);
  const text = (copy, xx, yy, size, style, opts) => {
    setFont(size || 7, style || 'normal');
    doc.setTextColor(0, 0, 0);
    doc.text(String(copy || ''), x(xx), x(yy), opts || {});
  };
  const line = (x1, y1, x2, y2) => doc.line(x(x1), x(y1), x(x2), x(y2));
  const rect = (xx, yy, w, h, mode) => doc.rect(x(xx), x(yy), x(w), x(h), mode || undefined);
  const width = (copy, size, style) => {
    setFont(size || 7, style || 'normal');
    return doc.getTextWidth(String(copy || '')) / mm;
  };
  const fill = (copy, xx, yy, w, size, keepCase) => {
    const value = keepCase ? String(copy || '') : String(copy || '').toUpperCase();
    const cleanValue = value.replace(/\n/g, ', ');
    setFont(size || 9, 'bold');
    const lines = doc.splitTextToSize(cleanValue, x(w));
    doc.text(lines[0] || '', x(xx), x(yy));
  };
  const field = (label, copy, xx, yy, w, keepCase, noLine) => {
    const lw = width(label, 7, 'bold');
    text(label, xx, yy, 7, 'bold');
    if (!noLine) {
      line(xx + lw + 2, yy + 0.5, xx + w, yy + 0.5);
    }
    fill(copy, xx + lw + 3, yy - 1.2, Math.max(4, w - lw - 4), 9, keepCase);
  };
  const fullLine = (label, copy, keepCase) => {
    field(label, copy, margin, y, pageW - margin * 2, keepCase);
    y += 5.5;
  };
  const wrappedField = (label, copy, h, keepCase) => {
    const lw = width(label, 7, 'bold');
    text(label, margin, y, 7, 'bold');
    
    const value = keepCase ? String(copy || '') : String(copy || '').toUpperCase();
    const cleanValue = value.replace(/\n/g, ', ');
    setFont(9, 'bold');
    const lines = doc.splitTextToSize(cleanValue, x(pageW - margin * 2 - lw - 4));
    
    line(margin + lw + 2, y + 0.5, pageW - margin, y + 0.5);
    if (lines.length > 0) doc.text(lines[0], x(margin + lw + 3), x(y - 1.2));
    
    if (lines.length > 1) {
      line(margin, y + 7.5, pageW - margin, y + 7.5);
      doc.text(lines[1], x(margin + 2), x(y + 5.8));
    }
    
    if (lines.length > 2) {
      line(margin, y + 14.5, pageW - margin, y + 14.5);
      doc.text(lines[2], x(margin + 2), x(y + 12.8));
    }
    
    const numLines = lines.length || 1;
    if (numLines === 1) {
      y += h || 9;
    } else if (numLines === 2) {
      y += Math.max(h || 9, 14);
    } else {
      y += Math.max(h || 9, 19);
    }
  };
  const section = (title, w) => {
    doc.setFillColor(215, 215, 215);
    rect(margin, y - 3.5, w || (pageW - margin * 2), 5, 'F');
    text(title, margin + 1, y, 7, 'bold');
    y += 5.5;
  };
  const check = (label, checked, xx, yy) => {
    rect(xx, yy - 3, 3, 3);
    if (checked) {
      doc.setLineWidth(0.8);
      line(xx + 0.5, yy - 1.5, xx + 1.2, yy - 0.5);
      line(xx + 1.2, yy - 0.5, xx + 2.7, yy - 2.7);
      doc.setLineWidth(0.2);
    }
    text(label, xx + 4, yy, 6.2);
  };

  doc.setDrawColor(20, 20, 20);
  doc.setLineWidth(0.2);
  line(margin, 6, pageW - margin, 6);

  text('Vivek Financial', margin, 24, 12, 'normal');
  text('KNOW YOUR CLIENT (KYC) APPLICATION FORM', 76, 16, 7, 'bold');
  line(76, 17, 134, 17);
  text('Non Individuals', 146, 21, 7, 'bolditalic');

  rect(165, 14, 35, 45);
  text('PHOTOGRAPH', 170, 18, 5.5, 'bold');
  line(165, 19, 200, 19);
  text('Please affix your', 169, 38, 5);
  text('recent passport', 169, 42, 5);
  text('size photograph', 169, 46, 5);
  text('and sign across it', 169, 50, 5);

  y = 30;
  text('Please fill this form in ENGLISH and in BLOCK LETTERS', margin, y, 7, 'bold');
  y += 5;

  section('A. IDENTITY DETAILS', 153);
  field('1. Name of the Applicant', applicantName, margin, y, 153);
  y += 5.5;
  field('2. Date of incorporation:', val('incorporationDate'), margin, y, 55);
  text('(dd/mm/yyyy)', 66, y, 6);
  field('& Place of incorporation:', val('incorporationPlace'), 81, y, 79);
  y += 5.5;
  field('3. Date of commencement of business:', val('commencementDate'), margin, y, 153);
  y += 5.5;
  field('4. a. PAN:', val('pan'), margin, y, 153);
  y += 5.5;
  field('b. Registration No. (e.g. CIN):', val('registrationNo'), margin, y, 153);
  y += 5.5;
  text('5. Status (please tick any one):', margin, y, 7, 'bold');
  y += 5;

  const status = String(data.status || '');
  const statuses = [
    'Private Limited Co.', 'Public Ltd. Co.', 'Body Corporate', 'Partnership', 'Trust',
    'Charities', 'NGO', 'FI', 'FII', 'HUF', 'AOP', 'Bank', 'Government Body',
    'Non-Government Organization', 'Defense Establishment', 'BOI', 'Society', 'LLP', 'Others'
  ];
  let sx = margin + 4;
  let sy = y;
  statuses.forEach((item, index) => {
    check(item, item === status || (item === 'Others' && val('statusOther')), sx, sy);
    sx += 36;
    if ((index + 1) % 4 === 0) {
      sx = margin + 4;
      sy += 4.5;
    }
  });
  y = sy + 5.5;
  fullLine('Specify:', val('statusOther'));

  section('B. ADDRESS DETAILS');
  wrappedField('1. Address for correspondence:', val('address'), 10);
  field('City/town/village:', val('city'), margin, y, 55);
  field('Pin Code:', val('pin'), 67, y, 35);
  field('State:', val('state'), 104, y, 60);
  field('Country:', 'INDIA', 166, y, 34);
  y += 5.5;
  field('2. Contact Details: Tel. (O)', val('telOffice'), margin, y, 62);
  field('Tel. (Res)', val('telResidence'), 74, y, 42);
  field('Mobile No.:', val('mobile'), 118, y, 82);
  y += 5.5;
  fullLine('Email id:', emailVal('email'), true);
  wrappedField('3. Specify the proof of address submitted for correspondence address:', val('addressProof'), 8);
  wrappedField('4. Registered Address (if different from above):', val('registeredAddress'), 10);
  field('City/town/village:', val('registeredCity'), margin, y, 55);
  field('Pin Code:', val('registeredPin'), 67, y, 35);
  field('State:', val('registeredState'), 104, y, 60);
  field('Country:', 'INDIA', 166, y, 34);
  y += 6;

  section('C. OTHER DETAILS');
  wrappedField('1. Name, PAN, residential address and photographs of Promoters/Partners/Karta/Trustees and whole time directors:', '', 11);
  fullLine('2. a) DIN of whole time directors:', '');
  fullLine('b) Aadhaar number of Promoters/ Partner/ Karta:', '');

  section('DECLARATION');
  setFont(6.6);
  const declaration = 'I/We hereby declare that the details furnished above are true and correct to the best of my/our knowledge and belief and I/we undertake to inform you of any changes therein, immediately. In case any of the above information is found to be false or untrue or misleading or misrepresenting, I am/we are aware that I/we may be held liable for it.';
  doc.text(doc.splitTextToSize(declaration, x(pageW - margin * 2)), x(margin), x(y));
  y += 20; 
  doc.setFont('helvetica', 'italic').setFontSize(9);
  doc.setTextColor(150, 150, 150);
  doc.text('Signature', x(margin + 22.5), x(y - 4), { align: 'center' });
  field('Name & Signature of the Authorised Signatory:', val('signatoryName') || applicantName, margin, y, 137);
  field('Date:', val('declarationDate'), 152, y, 48);
  text('(dd/mm/yyyy)', 181, y, 6);
  y += 8;

  doc.setDrawColor(20, 20, 20);
  line(margin, y - 3, pageW - margin, y - 3);
  section('FOR OFFICE USE ONLY');
  check('Self-Attested', false, margin + 2, y);
  check('Self Certified Document copies received', false, 55, y);
  y += 10;
  
  fullLine('For Vivek Financial Focus Ltd.', '');
  y += 12; 
  field('Signature of Authorised Signatory', '', margin, y, 100);
  field('Seal/Stamp of the Intermediary', '', 121, y, 79);
  y += 10; 
  field('Date', '', 152, y, 48);
  
  line(margin, 283, pageW - margin, 283);
}

</script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://unpkg.com/imask"></script>
  <script>
    document.querySelectorAll('input[placeholder="dd/mm/yyyy"]').forEach(function(el) {
      // Apply IMask first to force typing format
      var mask = IMask(el, {
        mask: '00/00/0000',
        lazy: false,
        placeholderChar: '_'
      });

      // Initialize Flatpickr calendar and sync with IMask
      flatpickr(el, {
        dateFormat: "d/m/Y",
        allowInput: true,
        onChange: function(selectedDates, dateStr, instance) {
          mask.value = dateStr;
          mask.updateValue();
        }
      });
    });
  </script>
</body>
</html>
